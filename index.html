<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Anime Photo Converter</title>
    <style>
        *{margin: 0;padding: 0;box-sizing: border-box;}
        body{
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg,#6366f1,#8b5cf6);
            color:#fff;
            text-align:center;
            padding:40px 20px;
        }
        .container{
            max-width:500px;
            margin:0 auto;
            background:rgba(255,255,255,0.1);
            padding:30px;
            border-radius:20px;
            backdrop-filter: blur(10px);
        }
        h1{font-size:28px;margin-bottom:20px;}
        .desc{margin-bottom:25px;opacity:0.9;}
        .upload-box{
            border:2px dashed #fff;
            border-radius:15px;
            padding:40px 20px;
            cursor:pointer;
            margin-bottom:20px;
        }
        #file-input{display:none;}
        .style-list{
            display:grid;
            grid-template-columns: 1fr 1fr;
            gap:12px;
            margin:20px 0;
        }
        .style-item{
            background:rgba(255,255,255,0.2);
            padding:12px;
            border-radius:10px;
        }
        .style-item.active{
            background:#fff;
            color:#6366f1;
            font-weight:bold;
        }
        button{
            width:100%;
            padding:15px;
            border:none;
            border-radius:12px;
            background:#fff;
            color:#6366f1;
            font-size:18px;
            font-weight:bold;
            cursor:pointer;
        }
        .result-img{
            width:100%;
            border-radius:15px;
            margin-top:20px;
            display:none;
        }
        /* 付费弹窗 */
        .pay-popup{
            position:fixed;
            top:0;
            left:0;
            width:100%;
            height:100%;
            background:rgba(0,0,0,0.7);
            display:none;
            align-items:center;
            justify-content:center;
        }
        .pay-box{
            background:#fff;
            color:#333;
            padding:30px;
            border-radius:20px;
            width:90%;
            max-width:400px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>AI  Anime Photo Convert</h1>
        <p class="desc">One click to turn your photo into Ghibli / anime / cyberpunk style</p>

        <div class="upload-box" onclick="document.getElementById('file-input').click()">
            <p>Click Upload Your Photo</p>
            <input type="file" id="file-input" accept="image/*">
        </div>

        <div class="style-list">
            <div class="style-item active" onclick="chooseStyle(this)">Ghibli Style</div>
            <div class="style-item" onclick="chooseStyle(this)">Cartoon Anime</div>
            <div class="style-item" onclick="chooseStyle(this)">Cyberpunk</div>
            <div class="style-item" onclick="chooseStyle(this)">Watercolor</div>
        </div>

        <button id="create-btn">Generate Now</button>
        <img class="result-img" id="result">
    </div>

    <!-- 付费弹窗 -->
    <div class="pay-popup" id="payPopup">
        <div class="pay-box">
            <h2>Only Paid Members Can Generate</h2>
            <p>Monthly Membership : $6.99</p>
            <p>One Time Use : $0.5</p>
            <button style="margin-top:20px;background:#6366f1;color:white" onclick="closePay()">Pay Now</button>
        </div>
    </div>

    <script>
        let selectStyle = "Ghibli Style";

        //选择风格
        function chooseStyle(el){
            let items = document.querySelectorAll(".style-item");
            items.forEach(i=>i.classList.remove("active"));
            el.classList.add("active");
            selectStyle = el.innerText;
        }

        //生成按钮
        document.getElementById("create-btn").onclick = function(){
            //直接触发付费弹窗
            document.getElementById("payPopup").style.display = "flex";
        }

        function closePay(){
            document.getElementById("payPopup").style.display = "none";
            //模拟生成成品图
            document.getElementById("result").src = "https://picsum.photos/500/500";
            document.getElementById("result").style.display = "block";
        }
    </script>
</body>
</html>
